<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40" role="img" aria-label="Download on the App Store">
  <defs>
    <linearGradient id="asbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <mask id="applebite">
      <rect width="120" height="40" fill="white"/>
      <circle cx="24" cy="18" r="2.8" fill="black"/>
    </mask>
  </defs>
  <rect width="120" height="40" rx="5" fill="url(#asbg)"/>
  <!-- Apple: circle with bite -->
  <circle cx="20" cy="20" r="8.5" fill="#fff" mask="url(#applebite)"/>
  <text x="42" y="16" fill="#fff" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="8" font-weight="400">Download on the</text>
  <text x="42" y="26" fill="#fff" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600">App Store</text>
</svg>
